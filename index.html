<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#C0161C">
<title>Job Dashboard — SNF</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root {
  --blue: #185FA5; --blue-light: #E6F1FB; --blue-dark: #0C447C;
  --green: #3B6D11; --green-light: #EAF3DE; --green-mid: #C0DD97;
  --amber: #854F0B; --amber-light: #FAEEDA;
  --red: #A32D2D; --red-light: #FCEBEB;
  --gray: #5F5E5A; --gray-light: #F4F3EF; --gray-mid: #D3D1C7;
  --border: #e2e2e2; --surface: #f8f8f7; --bg: #ffffff;
  --text: #1a1a1a; --text-sub: #6b6b6b;
  --nav-h: 62px;
  --header-h: 56px;
  --radius: 14px; --radius-sm: 8px;
  --shadow: 0 2px 12px rgba(0,0,0,.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,.14);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Noto Sans Thai', 'Segoe UI', sans-serif;
  background: var(--gray-light);
  color: var(--text);
  font-size: 14px;
  overscroll-behavior: none;
}

/* ── App Shell ── */
#app { height: 100dvh; display: flex; flex-direction: column; }

/* ── Header ── */
.app-header {
  height: var(--header-h);
  background: #C0161C;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.header-brand { display: flex; align-items: center; gap: 10px; }
.header-icon {
  width: 32px; height: 32px;
  background: rgba(255,255,255,.2);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.header-icon svg { width: 18px; height: 18px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.header-title { color: #fff; font-size: 16px; font-weight: 700; letter-spacing: .01em; }
.header-sub { color: rgba(255,255,255,.7); font-size: 10px; margin-top: 1px; }
.header-actions { display: flex; gap: 6px; }
.hbtn {
  width: 34px; height: 34px;
  border-radius: 8px;
  background: rgba(255,255,255,.15);
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
}
.hbtn svg { width: 17px; height: 17px; stroke: #fff; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.hbtn:active { background: rgba(255,255,255,.3); }

/* ── Scroll Area ── */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--nav-h) + 16px);
}

/* ── KPI Strip ── */
.kpi-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 12px 12px 0;
}
.kpi-card {
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 10px 8px;
  text-align: center;
  box-shadow: var(--shadow);
}
.kpi-label { font-size: 9px; color: var(--text-sub); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
.kpi-val { font-size: 22px; font-weight: 700; line-height: 1; }
.kpi-sub { font-size: 9px; color: var(--text-sub); margin-top: 2px; }
.c-blue .kpi-val { color: var(--blue); }
.c-amber .kpi-val { color: var(--amber); }
.c-green .kpi-val { color: var(--green); }
.c-red .kpi-val { color: var(--red); }

/* ── Progress ── */
.progress-row {
  margin: 10px 12px 0;
  background: var(--bg);
  border-radius: var(--radius-sm);
  padding: 10px 14px;
  box-shadow: var(--shadow);
}
.progress-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; font-size: 12px; }
.progress-bar { height: 6px; background: var(--gray-mid); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 4px; transition: width .5s ease; }

/* ── Search & Filter ── */
.toolbar {
  padding: 10px 12px 0;
  display: flex; gap: 8px;
}
.search-wrap {
  flex: 1;
  position: relative;
}
.search-wrap svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  width: 14px; height: 14px; stroke: var(--text-sub); fill: none; stroke-width: 2;
  pointer-events: none;
}
.search-wrap input {
  width: 100%; height: 38px;
  padding: 0 10px 0 32px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  font-size: 13px; font-family: inherit; color: var(--text);
}
.search-wrap input:focus { outline: none; border-color: var(--blue); }
.filter-btn {
  height: 38px; padding: 0 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  font-size: 12px; font-family: inherit; color: var(--text);
  cursor: pointer;
  display: flex; align-items: center; gap: 5px;
  white-space: nowrap;
}
.filter-btn.active { background: var(--blue-light); border-color: var(--blue); color: var(--blue-dark); }
.filter-btn svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

/* ── Filter Chips ── */
.filter-chips {
  padding: 8px 12px 0;
  display: flex; gap: 6px; overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.filter-chips::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  height: 30px; padding: 0 12px;
  border-radius: 100px;
  border: 1px solid var(--border);
  background: var(--bg);
  font-size: 11px; font-family: inherit; color: var(--text-sub);
  cursor: pointer;
  display: flex; align-items: center;
  white-space: nowrap;
}
.chip.active { background: var(--blue); color: #fff; border-color: var(--blue); }

/* ── Section Header ── */
.section-header {
  padding: 12px 12px 6px;
  display: flex; align-items: center; justify-content: space-between;
}
.section-title { font-size: 12px; font-weight: 600; color: var(--text-sub); text-transform: uppercase; letter-spacing: .06em; }
.section-count {
  font-size: 11px; font-weight: 600;
  background: var(--blue-light); color: var(--blue-dark);
  padding: 2px 8px; border-radius: 100px;
}

/* ── Job Cards ── */
.cards-list { padding: 0 12px; display: flex; flex-direction: column; gap: 8px; }
.job-card {
  background: var(--bg);
  border-radius: var(--radius);
  padding: 14px;
  box-shadow: var(--shadow);
  border-left: 4px solid transparent;
  position: relative;
  animation: slideIn .2s ease;
}
@keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
.job-card.p-urgent { border-left-color: var(--red); }
.job-card.p-high { border-left-color: var(--amber); }
.job-card.p-normal { border-left-color: var(--blue); }
.job-card.p-low { border-left-color: var(--green); }
.job-card.done-card { opacity: .65; }

.card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 6px; }
.card-title { font-size: 14px; font-weight: 600; line-height: 1.4; flex: 1; }
.card-actions { display: flex; gap: 4px; flex-shrink: 0; }
.card-actions button {
  width: 28px; height: 28px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--bg);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-sub);
}
.card-actions button svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.card-actions button.del:active { background: var(--red-light); color: var(--red); border-color: #f7c1c1; }
.card-actions button.edit:active { background: var(--blue-light); color: var(--blue-dark); }

.card-desc { font-size: 12px; color: var(--text-sub); margin-bottom: 10px; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

.card-meta { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.badge {
  display: inline-flex; align-items: center;
  font-size: 10px; font-weight: 600;
  padding: 3px 9px; border-radius: 100px;
  white-space: nowrap;
}
.p-urgent-b { background: var(--red-light); color: var(--red); }
.p-high-b { background: var(--amber-light); color: var(--amber); }
.p-normal-b { background: var(--blue-light); color: var(--blue-dark); }
.p-low-b { background: var(--green-light); color: var(--green); }
.s-todo { background: var(--gray-light); color: var(--gray); }
.s-doing { background: var(--blue-light); color: var(--blue-dark); }
.s-done { background: var(--green-light); color: var(--green); }
.s-hold { background: var(--amber-light); color: var(--amber); }
.s-badge { cursor: pointer; }

.card-dept { font-size: 10px; color: var(--text-sub); padding: 3px 7px; background: var(--gray-light); border-radius: 100px; }
.card-due { font-size: 10px; padding: 3px 7px; border-radius: 100px; }
.due-ok { background: var(--surface); color: var(--text-sub); }
.due-warn { background: var(--amber-light); color: var(--amber); }
.due-over { background: var(--red-light); color: var(--red); font-weight: 600; }
.due-done { background: var(--green-light); color: var(--green); }

/* ── Empty ── */
.empty {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-sub);
}
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.empty p { font-size: 13px; }

/* ── FAB ── */
.fab {
  position: fixed;
  bottom: calc(var(--nav-h) + 16px);
  right: 16px;
  width: 52px; height: 52px;
  background: var(--blue);
  border: none; border-radius: 50%;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 20px rgba(24,95,165,.45);
  z-index: 20;
  transition: transform .15s, box-shadow .15s;
}
.fab:active { transform: scale(.93); box-shadow: 0 2px 10px rgba(24,95,165,.35); }
.fab svg { width: 22px; height: 22px; fill: none; stroke: #fff; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }

/* ── Bottom Nav ── */
.bottom-nav {
  height: var(--nav-h);
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
  padding-bottom: env(safe-area-inset-bottom);
}
.nav-tab {
  flex: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 3px;
  border: none; background: none; cursor: pointer;
  color: var(--text-sub);
  font-size: 10px; font-family: inherit;
  transition: color .15s;
  padding-top: 6px;
}
.nav-tab svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
.nav-tab.active { color: var(--blue); }
.nav-tab.active svg { stroke-width: 2.2; }
.nav-dot {
  width: 5px; height: 5px; background: var(--red);
  border-radius: 50%; position: absolute; top: 8px;
  margin-left: 10px;
}

/* ── Bottom Sheet (Form) ── */
.sheet-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.4);
  z-index: 50;
  align-items: flex-end;
}
.sheet-overlay.open { display: flex; }
.sheet {
  background: var(--bg);
  border-radius: 20px 20px 0 0;
  width: 100%;
  max-height: 92dvh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0 0 env(safe-area-inset-bottom);
  animation: sheetUp .25s ease;
}
@keyframes sheetUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.sheet-handle {
  width: 36px; height: 4px;
  background: var(--gray-mid);
  border-radius: 2px;
  margin: 12px auto 0;
}
.sheet-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px 0;
  margin-bottom: 16px;
}
.sheet-title { font-size: 16px; font-weight: 700; }
.sheet-close {
  width: 30px; height: 30px;
  border-radius: 50%;
  border: none; background: var(--gray-light);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--text-sub);
}
.form-body { padding: 0 16px 20px; }
.form-row { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 5px; display: block; }
.form-input, .form-select, .form-textarea {
  width: 100%; padding: 11px 12px;
  border: 1px solid var(--border); border-radius: var(--radius-sm);
  background: var(--bg); font-size: 14px; font-family: inherit; color: var(--text);
  -webkit-appearance: none; appearance: none;
}
.form-input:focus, .form-select:focus, .form-textarea:focus { outline: none; border-color: var(--blue); }
.form-textarea { resize: none; min-height: 80px; line-height: 1.5; }
.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.required { color: var(--red); }
.form-save-btn {
  width: 100%; padding: 14px;
  background: var(--blue); color: #fff;
  border: none; border-radius: var(--radius-sm);
  font-size: 15px; font-weight: 600; font-family: inherit;
  cursor: pointer; margin-top: 4px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.form-save-btn:active { background: var(--blue-dark); }
.form-cancel-link {
  width: 100%; padding: 12px;
  background: none; border: none;
  font-size: 14px; color: var(--text-sub); font-family: inherit;
  cursor: pointer; margin-top: 4px;
}

/* ── Confirm Dialog ── */
.dialog-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 60;
  align-items: center; justify-content: center;
  padding: 24px;
}
.dialog-overlay.open { display: flex; }
.dialog {
  background: var(--bg);
  border-radius: var(--radius);
  padding: 22px;
  width: 100%; max-width: 320px;
  animation: popIn .2s ease;
}
@keyframes popIn { from { opacity:0; transform: scale(.92); } to { opacity:1; transform: scale(1); } }
.dialog-title { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
.dialog-body { font-size: 13px; color: var(--text-sub); line-height: 1.6; margin-bottom: 18px; }
.dialog-btns { display: flex; gap: 8px; }
.dialog-btns button {
  flex: 1; padding: 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  font-size: 14px; font-weight: 500; font-family: inherit;
  cursor: pointer;
}
.dialog-btns .btn-cancel { background: var(--surface); color: var(--text); }
.dialog-btns .btn-delete { background: var(--red); color: #fff; border-color: var(--red); }

/* ── Toast ── */
.toast {
  position: fixed; bottom: calc(var(--nav-h) + 80px); left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: #1a1a1a; color: #fff;
  padding: 10px 18px; border-radius: 100px;
  font-size: 13px; z-index: 999;
  opacity: 0; transition: all .25s;
  pointer-events: none; white-space: nowrap;
  max-width: calc(100vw - 48px);
  text-align: center;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--green); }
.toast.error { background: var(--red); }

/* ── Filter Sheet ── */
.fsheet-row { padding: 0 16px; margin-bottom: 12px; }
.fsheet-row label { font-size: 12px; font-weight: 600; color: var(--text-sub); margin-bottom: 5px; display: block; }

/* ── User Card ── */
.user-strip {
  margin: 10px 12px 0;
  background: #C0161C;
  border-radius: var(--radius-sm);
  padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  border: 2px solid rgba(255,255,255,.25);
}
.avatar {
  width: 46px; height: 46px;
  border-radius: 50%; background: rgba(255,255,255,.25);
  border: 2px solid rgba(255,255,255,.5);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 800; color: #fff; flex-shrink: 0;
}
.user-name { font-size: 17px; font-weight: 700; color: #fff; letter-spacing: .01em; }
.user-dept { font-size: 13px; color: rgba(255,255,255,.8); margin-top: 3px; font-weight: 500; }

/* ── User Picker ── */
.user-picker-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 60;
  align-items: center; justify-content: center;
  padding: 24px;
}
.user-picker-overlay.open { display: flex; }
.user-picker-box {
  background: var(--bg);
  border-radius: var(--radius);
  padding: 22px;
  width: 100%; max-width: 340px;
  animation: popIn .2s ease;
}
.user-picker-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; }
.user-list { display: flex; flex-direction: column; gap: 8px; max-height: 60dvh; overflow-y: auto; }
.user-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: background .15s;
}
.user-item:active, .user-item.selected { background: var(--blue-light); border-color: var(--blue); }
.user-item-avatar {
  width: 34px; height: 34px; border-radius: 50%;
  background: var(--blue); color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.user-item-name { font-size: 13px; font-weight: 600; }
.user-item-dept { font-size: 11px; color: var(--text-sub); margin-top: 1px; }

/* ── Print ── */@media print {
  .app-header, .bottom-nav, .fab, .card-actions, .toolbar, .filter-chips { display: none !important; }
  .scroll-area { overflow: visible; padding-bottom: 0; }
  .job-card { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; margin-bottom: 8px; }
  body { background: white; }
}
</style>
</head>
<body>

<div id="app">

  <!-- Header -->
  <div class="app-header">

<!-- Form Sheet -->
<div class="sheet-overlay" id="formSheet">
  <div class="sheet" id="sheetInner">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <span class="sheet-title" id="formTitle">เพิ่มงานใหม่</span>
      <button class="sheet-close" onclick="closeForm()">✕</button>
    </div>
    <div class="form-body">
      <div class="form-row">
        <label class="form-label">ชื่องาน <span class="required">*</span></label>
        <input class="form-input" id="fTitle" type="text" placeholder="ระบุชื่องาน">
      </div>
      <div class="form-row">
        <label class="form-label">รายละเอียดงาน</label>
        <textarea class="form-textarea" id="fDesc" placeholder="อธิบายขั้นตอน หรือข้อควรระวัง..."></textarea>
      </div>
      <div class="form-grid-2">
        <div class="form-row">
          <label class="form-label">Priority</label>
          <select class="form-select" id="fPri">
            <option value="urgent">⚡ เร่งด่วนมาก (1-3 วัน)</option>
            <option value="high">🔴 สำคัญ (4-14 วัน)</option>
            <option value="normal" selected>🔵 ปกติ (15-30 วัน)</option>
            <option value="low">🟢 ไม่เร่ง (1 เดือนขึ้นไป)</option>
          </select>
        </div>
        <div class="form-row">
          <label class="form-label">สถานะ</label>
          <select class="form-select" id="fStatus">
            <option value="todo" selected>รอดำเนินการ</option>
            <option value="doing">กำลังทำ</option>
            <option value="done">เสร็จแล้ว</option>
          </select>
        </div>
      </div>
      <div class="form-grid-2">
        <div class="form-row">
          <label class="form-label">Due Date</label>
          <input class="form-input" id="fDue" type="date">
        </div>
        <div class="form-row">
          <label class="form-label">แผนก / Line</label>
          <input class="form-input" id="fDept" type="text" placeholder="เช่น สาย A">
        </div>
      </div>
      <div class="form-row">
        <label class="form-label">หมายเหตุ</label>
        <input class="form-input" id="fNote" type="text" placeholder="ข้อมูลเพิ่มเติม...">
      </div>
      <button class="form-save-btn" onclick="saveJob()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        บันทึก
      </button>
      <button class="form-cancel-link" onclick="closeForm()">ยกเลิก</button>
    </div>
  </div>
</div>

    <!-- Add User Form -->
    <div id="addUserForm" style="display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">
      <div style="font-size:13px;font-weight:600;margin-bottom:10px;color:var(--text);">➕ เพิ่มผู้ใช้ใหม่</div>
      <input class="form-input" id="newUserName" type="text" placeholder="ชื่อ-นามสกุล *" style="margin-bottom:8px;">
      <input class="form-input" id="newUserDept" type="text" placeholder="แผนก / ตำแหน่ง" style="margin-bottom:10px;">
      <div style="display:flex;gap:8px;">
        <button onclick="saveNewUser()" style="flex:1;padding:10px;background:var(--blue);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;">บันทึก</button>
        <button onclick="document.getElementById('addUserForm').style.display='none'" style="flex:1;padding:10px;background:var(--gray-light);color:var(--text);border:none;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;">ยกเลิก</button>
      </div>
    </div>
    <button class="form-cancel-link" onclick="closeUserPicker()" style="margin-top:10px;">ปิด</button>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const USER_STORAGE = 'snf_current_user';
const USERS_STORAGE = 'snf_users_list_v1';
let currentUser = null;

function loadAllUsers(){
  try{ const s=localStorage.getItem(USERS_STORAGE); if(s) return JSON.parse(s); }catch(e){}
  return [];
}
function saveAllUsers(arr){ try{localStorage.setItem(USERS_STORAGE,JSON.stringify(arr));}catch(e){} }
function loadUser(){ try{ const s=localStorage.getItem(USER_STORAGE); if(s) return JSON.parse(s); }catch(e){} return null; }
function saveUser(u){ try{localStorage.setItem(USER_STORAGE,JSON.stringify(u));}catch(e){} }
function makeAvatar(name){ return name.trim().slice(0,2) || '?'; }
function genUserId(){ return 'u'+Date.now(); }

function openUserPicker(){
  renderUserList();
  document.getElementById('userPickerDialog').classList.add('open');
}
function closeUserPicker(){
  document.getElementById('userPickerDialog').classList.remove('open');
  document.getElementById('addUserForm').style.display='none';
}
function renderUserList(){
  const users = loadAllUsers();
  const list = document.getElementById('userList');
  if(!users.length){
    list.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-sub);font-size:13px;">ยังไม่มีผู้ใช้<br>กด + เพิ่มผู้ใช้ใหม่</div>';
  } else {
    list.innerHTML = users.map(u=>`
      <div class="user-item${currentUser&&currentUser.id===u.id?' selected':''}">
        <div class="user-item-avatar" onclick="selectUser('${u.id}')" style="cursor:pointer;">${makeAvatar(u.name)}</div>
        <div style="flex:1;cursor:pointer;" onclick="selectUser('${u.id}')">
          <div class="user-item-name">${escHtml(u.name)}</div>
          <div class="user-item-dept">${escHtml(u.dept)}</div>
        </div>
        <button onclick="deleteUser('${u.id}')" style="width:26px;height:26px;border:none;background:var(--red-light);color:var(--red);border-radius:6px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;">✕</button>
      </div>`).join('');
  }
}
function selectUser(id){
  const users = loadAllUsers();
  currentUser = users.find(u=>u.id===id);
  if(!currentUser) return;
  saveUser(currentUser);
  applyUser();
  closeUserPicker();
  renderKpi();
  showToast('สวัสดี '+currentUser.name,'success');
}
function deleteUser(id){
  let users = loadAllUsers();
  users = users.filter(u=>u.id!==id);
  saveAllUsers(users);
  if(currentUser&&currentUser.id===id){
    currentUser=null;
    localStorage.removeItem(USER_STORAGE);
    document.getElementById('avatarEl').textContent='?';
    document.getElementById('userNameEl').textContent='เลือกผู้ใช้งาน';
    document.getElementById('userDeptEl').textContent='แตะเพื่อเข้าสู่ระบบ';
    document.getElementById('progressUserLabel').textContent='ความคืบหน้าของฉัน';
  }
  renderUserList();
}
function showAddUserForm(){
  document.getElementById('addUserForm').style.display='block';
  document.getElementById('newUserName').value='';
  document.getElementById('newUserDept').value='';
  setTimeout(()=>document.getElementById('newUserName').focus(),100);
}
function saveNewUser(){
  const name = document.getElementById('newUserName').value.trim();
  const dept = document.getElementById('newUserDept').value.trim();
  if(!name){ showToast('กรุณาระบุชื่อ-นามสกุล','error'); return; }
  const users = loadAllUsers();
  users.push({id:genUserId(), name, dept: dept||'ไม่ระบุแผนก'});
  saveAllUsers(users);
  document.getElementById('addUserForm').style.display='none';
  renderUserList();
  showToast('เพิ่มผู้ใช้แล้ว','success');
}
function applyUser(){
  if(!currentUser) return;
  document.getElementById('avatarEl').textContent = makeAvatar(currentUser.name);
  document.getElementById('userNameEl').textContent = currentUser.name;
  document.getElementById('userDeptEl').textContent = currentUser.dept;
  document.getElementById('progressUserLabel').textContent = 'ความคืบหน้าของ '+currentUser.name;
}

const PRI_ORDER = {urgent:0,high:1,normal:2,low:3};
const STATUS_ORDER = {todo:0,doing:1,done:2};
const PRI_LABEL = {urgent:'⚡ เร่งด่วนมาก (1-3 วัน)',high:'🔴 สำคัญ (4-14 วัน)',normal:'🔵 ปกติ (15-30 วัน)',low:'🟢 ไม่เร่ง (1 เดือน+)'};
const PRI_CLASS = {urgent:'p-urgent-b',high:'p-high-b',normal:'p-normal-b',low:'p-low-b'};
const STATUS_LABEL = {todo:'รอดำเนินการ',doing:'กำลังทำ',done:'เสร็จแล้ว'};
const STATUS_CLASS = {todo:'s-todo',doing:'s-doing',done:'s-done'};

const today = new Date(); today.setHours(0,0,0,0);
function addD(n){const d=new Date(today);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function fmtD(s){if(!s)return'—';const d=new Date(s+'T00:00:00');return d.toLocaleDateString('th-TH',{day:'numeric',month:'short'})}
function daysDiff(s){if(!s)return null;const d=new Date(s+'T00:00:00');return Math.round((d-today)/(1000*60*60*24))}
function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

const STORAGE_KEY = 'snf_jobs_v1';
function loadJobs(){
  try{const s=localStorage.getItem(STORAGE_KEY);if(s)return JSON.parse(s);}catch(e){}
  return [
    {id:1,title:'ตรวจสอบเบ้าหลอมโลหะ A1',desc:'ตรวจสภาพเบ้าหลอมก่อนเริ่มกะเช้า ทำความสะอาดและบันทึกผล',priority:'urgent',status:'doing',due:addD(0),dept:'สายการผลิต A',note:'ต้องแล้วเสร็จก่อน 07:00'},
    {id:2,title:'เติมวัตถุดิบเหล็กหล่อสาย 2',desc:'เติม Raw material ตามใบสั่งงาน WO-2048',priority:'high',status:'todo',due:addD(1),dept:'สายการผลิต B',note:''},
    {id:3,title:'บำรุงรักษาเครื่องฉีดทราย',desc:'PM รายเดือน — ตรวจสายพาน น้ำมัน และแรงดัน',priority:'normal',status:'todo',due:addD(3),dept:'ซ่อมบำรุง',note:''},
    {id:4,title:'บันทึก Log อุณหภูมิเตาหลอม',desc:'บันทึกอุณหภูมิทุก 2 ชั่วโมงลงในระบบ',priority:'normal',status:'done',due:addD(-1),dept:'สายการผลิต A',note:'เสร็จแล้ว'},
    {id:5,title:'รายงานสรุป Defect ประจำวัน',desc:'รวบรวมชิ้นงานเสียและส่งรายงานหัวหน้าแผนก',priority:'high',status:'hold',due:addD(2),dept:'QC',note:'รอข้อมูลจากกะดึก'},
    {id:6,title:'ทดสอบ Hardness ชุดตัวอย่าง',desc:'ทดสอบ Brinell Hardness ชิ้นงาน Lot B-77',priority:'low',status:'todo',due:addD(5),dept:'QC',note:''},
  ];
}
function saveJobs(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(jobs));}catch(e){}}

let jobs = loadJobs();
let nextId = Math.max(...jobs.map(j=>j.id), 0) + 1;
let editId = null, deleteId = null;
let currentPage = 'jobs';
let chipStatus = 'all';

function setChip(status, el){
  chipStatus = status;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function showPage(page, el){
  currentPage = page;
  chipStatus = 'all';
  document.querySelectorAll('.chip').forEach((c,i)=>{c.classList.toggle('active',i===0)});
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const titles = {jobs:'รายการงานทั้งหมด',today:'งานวันนี้',overdue:'งานเกินกำหนด',done:'งานเสร็จแล้ว'};
  document.getElementById('sectionTitle').textContent = titles[page];
  document.getElementById('scrollArea').scrollTo({top:0,behavior:'smooth'});
  render();
}

function getFiltered(){
  const q = (document.getElementById('search')||{value:''}).value.toLowerCase();
  const fp = (document.getElementById('fltPri')||{value:''}).value;
  const sort = (document.getElementById('sortBy')||{value:'due'}).value;
  let list = jobs.filter(j=>{
    if(currentPage==='today'){if(j.due!==addD(0))return false;}
    else if(currentPage==='overdue'){if(!j.due||new Date(j.due+'T00:00:00')>=today||j.status==='done')return false;}
    else if(currentPage==='done'){if(j.status!=='done')return false;}
    if(chipStatus!=='all' && j.status!==chipStatus)return false;
    if(q && !j.title.toLowerCase().includes(q) && !(j.desc||'').toLowerCase().includes(q) && !(j.dept||'').toLowerCase().includes(q))return false;
    if(fp && j.priority!==fp)return false;
    return true;
  });
  list.sort((a,b)=>{
    if(sort==='pri')return PRI_ORDER[a.priority]-PRI_ORDER[b.priority];
    if(sort==='status')return STATUS_ORDER[a.status]-STATUS_ORDER[b.status];
    if(sort==='id')return a.id-b.id;
    return (a.due||'9999')>(b.due||'9999')?1:(a.due||'9999')<(b.due||'9999')?-1:0;
  });
  return list;
}

function render(){
  const list = getFiltered();
  document.getElementById('sectionCount').textContent = list.length;
  const container = document.getElementById('cardsList');

  if(!list.length){
    container.innerHTML = `<div class="empty"><div class="empty-icon">📋</div><p>ไม่พบรายการงาน</p></div>`;
    renderKpi(); return;
  }

  container.innerHTML = list.map(j=>{
    const diff = daysDiff(j.due);
    const over = diff!==null && diff<0 && j.status!=='done';
    const warn = diff!==null && diff>=0 && diff<=1 && j.status!=='done';
    const isDone = j.status==='done';
    let dueClass = 'due-ok', dueText = '—';
    if(j.due){
      dueText = fmtD(j.due);
      if(isDone) dueClass = 'due-done';
      else if(over){ dueClass='due-over'; dueText+=' (เกิน '+Math.abs(diff)+' วัน)'; }
      else if(warn){ dueClass='due-warn'; dueText += diff===0?' (วันนี้)':' (พรุ่งนี้)'; }
    }
    return `<div class="job-card p-${j.priority}${isDone?' done-card':''}">
      <div class="card-top">
        <div class="card-title">${escHtml(j.title)}</div>
        <div class="card-actions">
          <button class="edit" onclick="editJob(${j.id})" aria-label="แก้ไข">
            <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </button>
          <button class="del" onclick="askDelete(${j.id})" aria-label="ลบ">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>
      ${j.desc?`<div class="card-desc">${escHtml(j.desc)}</div>`:''}
      <div class="card-meta">
        <span class="badge ${PRI_CLASS[j.priority]}">${PRI_LABEL[j.priority]}</span>
        <span class="badge ${STATUS_CLASS[j.status]} s-badge" onclick="quickStatus(${j.id})" title="แตะเพื่อเปลี่ยนสถานะ">${STATUS_LABEL[j.status]}</span>
        ${j.dept?`<span class="card-dept">${escHtml(j.dept)}</span>`:''}
        ${j.due?`<span class="card-due ${dueClass}">📅 ${dueText}</span>`:''}
      </div>
      ${j.note?`<div style="margin-top:8px;font-size:11px;color:var(--text-sub);">💬 ${escHtml(j.note)}</div>`:''}
    </div>`;
  }).join('');
  renderKpi();
}

function renderKpi(){
  const t=jobs.length, doing=jobs.filter(j=>j.status==='doing').length;
  const dn=jobs.filter(j=>j.status==='done').length;
  const ov=jobs.filter(j=>j.due&&new Date(j.due+'T00:00:00')<today&&j.status!=='done').length;
  document.getElementById('kpiStrip').innerHTML=`
    <div class="kpi-card c-blue"><div class="kpi-label">ทั้งหมด</div><div class="kpi-val">${t}</div></div>
    <div class="kpi-card c-amber"><div class="kpi-label">กำลังทำ</div><div class="kpi-val">${doing}</div></div>
    <div class="kpi-card c-green"><div class="kpi-label">เสร็จแล้ว</div><div class="kpi-val">${dn}</div></div>
    <div class="kpi-card c-red"><div class="kpi-label">เกินกำหนด</div><div class="kpi-val">${ov}</div></div>`;
  // Progress ของ User ที่ login (กรองตาม dept ถ้ามี user)
  let userJobs = jobs;
  if(currentUser){
    userJobs = jobs.filter(j=>(j.dept||'').includes(currentUser.dept.replace('แผนก','').replace('สาย','').trim()) || true);
    // แสดง % งานที่ทำเสร็จของ user โดยอิงจากงานที่ assigned dept เดียวกัน
    userJobs = jobs.filter(j=>j.dept===currentUser.dept);
    if(!userJobs.length) userJobs = jobs; // fallback ทั้งหมดถ้าไม่มีงาน dept ตรง
  }
  const ut = userJobs.length;
  const udn = userJobs.filter(j=>j.status==='done').length;
  const pct = ut>0?Math.round(udn/ut*100):0;
  document.getElementById('progressLabel').textContent=pct+'%';
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressFill').style.background=pct>=80?'var(--green)':pct>=50?'var(--amber)':'var(--blue)';
}

// ── Form ──
function openAddForm(){
  editId=null; clearForm();
  document.getElementById('formTitle').textContent='เพิ่มงานใหม่';
  document.getElementById('formSheet').classList.add('open');
  setTimeout(()=>document.getElementById('fTitle').focus(),300);
}
function editJob(id){
  const j=jobs.find(x=>x.id===id); editId=id;
  document.getElementById('fTitle').value=j.title;
  document.getElementById('fDesc').value=j.desc||'';
  document.getElementById('fPri').value=j.priority;
  document.getElementById('fStatus').value=j.status;
  document.getElementById('fDue').value=j.due||'';
  document.getElementById('fDept').value=j.dept||'';
  document.getElementById('fNote').value=j.note||'';
  document.getElementById('formTitle').textContent='แก้ไขงาน';
  document.getElementById('formSheet').classList.add('open');
}
function closeForm(){ document.getElementById('formSheet').classList.remove('open'); editId=null; }
function clearForm(){
  ['fTitle','fDesc','fDue','fDept','fNote'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fPri').value='normal';
  document.getElementById('fStatus').value='todo';
}
function saveJob(){
  const title=document.getElementById('fTitle').value.trim();
  if(!title){showToast('กรุณาระบุชื่องาน','error');document.getElementById('fTitle').focus();return;}
  const data={
    title, desc:document.getElementById('fDesc').value.trim(),
    priority:document.getElementById('fPri').value,
    status:document.getElementById('fStatus').value,
    due:document.getElementById('fDue').value||null,
    dept:document.getElementById('fDept').value.trim(),
    note:document.getElementById('fNote').value.trim()
  };
  if(editId){
    const i=jobs.findIndex(j=>j.id===editId);
    jobs[i]={...jobs[i],...data};
    showToast('บันทึกการแก้ไขแล้ว','success');
  } else {
    jobs.push({id:nextId++,...data});
    showToast('เพิ่มงานใหม่แล้ว','success');
  }
  saveJobs(); closeForm(); render();
}

// ── Quick Status ──
function quickStatus(id){
  const j=jobs.find(x=>x.id===id);
  const cycle=['todo','doing','done'];
  j.status=cycle[(cycle.indexOf(j.status)+1)%cycle.length];
  saveJobs(); render();
  showToast('เปลี่ยนเป็น: '+STATUS_LABEL[j.status]);
}

// ── Delete ──
function askDelete(id){
  deleteId=id;
  document.getElementById('delJobName').textContent=jobs.find(x=>x.id===id).title;
  document.getElementById('delDialog').classList.add('open');
}
function closeDelDialog(){ document.getElementById('delDialog').classList.remove('open'); deleteId=null; }
function confirmDelete(){
  jobs=jobs.filter(j=>j.id!==deleteId);
  saveJobs(); closeDelDialog(); render();
  showToast('ลบงานแล้ว');
}

// ── Filter Sheet ──
function openFilterSheet(){ document.getElementById('filterSheet').classList.add('open'); }
function closeFilterSheet(){ document.getElementById('filterSheet').classList.remove('open'); }

// ── Toast ──
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(type?' '+type:'');
  setTimeout(()=>t.className='toast',2500);
}

// ── Export Excel ──
function exportExcel(){
  const list=getFiltered();
  if(!list.length){showToast('ไม่มีข้อมูลสำหรับ Export','error');return;}
  const rows=[['ที่','ชื่องาน','รายละเอียด','แผนก / Line','Priority','สถานะ','Due Date','หมายเหตุ']];
  list.forEach((j,i)=>rows.push([i+1,j.title,j.desc||'',j.dept||'',PRI_LABEL[j.priority],STATUS_LABEL[j.status],j.due||'',j.note||'']));
  const wb=XLSX.utils.book_new();
  const ws=XLSX.utils.aoa_to_sheet(rows);
  ws['!cols']=[{wch:4},{wch:34},{wch:40},{wch:18},{wch:14},{wch:16},{wch:14},{wch:26}];
  XLSX.utils.book_append_sheet(wb,ws,'รายการงาน');
  const fname='job_report_'+new Date().toISOString().slice(0,10)+'.xlsx';
  XLSX.writeFile(wb,fname);
  showToast('Export Excel สำเร็จ','success');
}

// ── Close overlays on backdrop tap ──
document.getElementById('formSheet').addEventListener('click',function(e){if(e.target===this)closeForm();});
document.getElementById('filterSheet').addEventListener('click',function(e){if(e.target===this)closeFilterSheet();});
document.getElementById('userPickerDialog').addEventListener('click',function(e){if(e.target===this)closeUserPicker();});

currentUser = loadUser();
if(currentUser) applyUser();

render();

</script>
</body>
</html>
